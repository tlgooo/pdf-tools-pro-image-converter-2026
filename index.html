<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Tools Pro 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src='https://unpkg.com/tesseract.js@5.0.4/dist/tesseract.min.js'></script>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Tajawal', sans-serif; }
body { background:linear-gradient(135deg,#f0fdf9 0%,#ccfbf1 100%); min-height:100vh; padding:20px 15px 50px; }
.container { max-width:650px; margin:auto; }
.header { text-align:center; margin-bottom:25px; }
.header h1 { font-size:28px; color:#0f766e; font-weight:800; }
.buy-btn {
    display:block; width:100%; padding:18px;
    background:linear-gradient(135deg,#ff5722 0%,#ff9800 100%);
    color:white; text-align:center; border-radius:14px;
    font-size:18px; font-weight:800; text-decoration:none;
    margin-bottom:25px; box-shadow:0 6px 20px rgba(255,87,34,0.4);
    animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.02)} }
.card {
    background:white; border-radius:18px; padding:24px;
    box-shadow:0 8px 30px rgba(13,148,136,0.12);
    border:2px solid #99f6e4; margin-bottom:20px;
}
.card h2 { font-size:19px; color:#0f766e; margin-bottom:15px; font-weight:800; }
input[type=file] { width:100%; padding:16px; border:2px dashed #0d9488; border-radius:12px; margin-bottom:14px; cursor:pointer; background:#f0fdf9; font-weight:700; }
.btn { width:100%; padding:15px; background:linear-gradient(135deg,#0d9488 0%,#14b8a6 100%); color:white; border:none; border-radius:12px; font-size:16px; font-weight:800; cursor:pointer; margin-top:10px; }
.btn:disabled { background:#d1d5db; cursor:not-allowed; }
#preview { display:flex; flex-wrap:wrap; gap:8px; margin-top:12px; }
#preview img { width:75px; height:75px; object-fit:cover; border-radius:10px; border:3px solid #99f6e4; }
.status { margin-top:12px; padding:12px; border-radius:10px; text-align:center; font-weight:700; display:none; font-size:14px; }
.success { background:#d1fae5; color:#065f46; display:block; }
.error { background:#fee2e2; color:#991b1b; display:block; }
textarea { width:100%; height:160px; padding:12px; border:2px solid #99f6e4; border-radius:10px; margin-top:12px; font-size:15px; resize:vertical; }
select { width:100%; padding:12px; border:2px solid #99f6e4; border-radius:10px; margin-bottom:12px; font-size:15px; font-weight:700; }
label { font-weight:700; color:#0f766e; display:block; margin-bottom:6px; }
input[type=range] { width:100%; margin:10px 0; accent-color:#0d9488; }
</style>
</head>
<body>
<div class="container">

<div class="header">
    <h1>📄 PDF Tools Pro 2026</h1>
    <p>أقوى أدوات PDF والصور - مجاناً</p>
</div>

<!-- زرار الشراء برقمك -->
<a href="https://wa.me/201062183539?text=السلام عليكم، عايز أشتري النسخة الكاملة من PDF Tools Pro بدون علامة مائية" target="_blank" class="buy-btn">
🔥 اشتري النسخة الكاملة بدون علامة مائية - 99 جنيه فقط
</a>

<div class="card">
    <h2>📄 تحويل الصور إلى PDF</h2>
    <input type="file" id="images" accept="image/*" multiple>
    <div id="preview"></div>
    <button class="btn" id="convertBtn" onclick="convertToPDF()" disabled>⬇️ تحويل إلى PDF</button>
    <div class="status" id="statusPDF"></div>
</div>

<div class="card">
    <h2>🔍 استخراج النص من الصورة OCR</h2>
    <select id="langSelect">
        <option value="ara">العربية فقط</option>
        <option value="eng">English فقط</option>
        <option value="ara+eng">عربي + إنجليزي</option>
    </select>
    <input type="file" id="ocrInput" accept="image/*">
    <button class="btn" id="ocrBtn" onclick="runOCR()">🔍 استخراج النص</button>
    <div class="status" id="statusOCR"></div>
    <textarea id="ocrResult" placeholder="النص المستخرج هيظهر هنا..."></textarea>
</div>

<div class="card">
    <h2>🗜️ ضغط الصور</h2>
    <input type="file" id="compressInput" accept="image/*">
    <label>الجودة: <span id="qVal">80</span>%</label>
    <input type="range" id="quality" min="10" max="95" value="80">
    <button class="btn" id="compressBtn" onclick="compressImage()">⚡ اضغط الصورة</button>
    <div class="status" id="statusCompress"></div>
    <a id="downloadCompress" style="display:none; margin-top:12px;" class="btn" download="compressed.jpg">📥 تحميل الصورة المضغوطة</a>
</div>

</div>

<script>
const { jsPDF } = window.jspdf;
let selectedFiles = [];

document.getElementById('images').onchange = function(e) {
    selectedFiles = Array.from(e.target.files);
    const preview = document.getElementById('preview');
    preview.innerHTML = '';
    if(selectedFiles.length > 0) {
        document.getElementById('convertBtn').disabled = false;
        selectedFiles.forEach(f => {
            const reader = new FileReader();
            reader.onload = ev => {
                const img = document.createElement('img');
                img.src = ev.target.result;
                preview.appendChild(img);
            }
            reader.readAsDataURL(f);
        });
    } else {
        document.getElementById('convertBtn').disabled = true;
    }
}

async function convertToPDF() {
    const btn = document.getElementById('convertBtn');
    const status = document.getElementById('statusPDF');
    btn.disabled = true; btn.textContent = '⏳ جاري التحويل...';
    status.style.display = 'none';
    try {
        const pdf = new jsPDF();
        for(let i=0; i<selectedFiles.length; i++) {
            const file = selectedFiles[i];
            const imgData = await readFile(file);
            let format = file.type.includes('png')? 'PNG' : 'JPEG';
            if(i>0) pdf.addPage();
            const img = new Image();
            await new Promise(r => { img.onload=r; img.src=imgData });
            const w = pdf.internal.pageSize.getWidth();
            const h = pdf.internal.pageSize.getHeight();
            const ratio = Math.min(w/img.width, h/img.height);
            const imgW = img.width * ratio;
            const imgH = img.height * ratio;
            pdf.addImage(imgData, format, (w-imgW)/2, (h-imgH)/2, imgW, imgH);
            pdf.setFontSize(10);
            pdf.setTextColor(180,180,180);
            pdf.text('PDF-Tools Pro - النسخة المجانية', 12, h-10);
        }
        pdf.save('PDF-Tools-Pro.pdf');
        status.className = 'status success';
        status.textContent = '✅ تم التحويل بنجاح!';
        status.style.display = 'block';
    } catch(e) {
        status.className = 'status error';
        status.textContent = '❌ خطأ: ' + e.message;
        status.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = '⬇️ تحويل إلى PDF';
}

async function runOCR() {
    const file = document.getElementById('ocrInput').files[0];
    const lang = document.getElementById('langSelect').value;
    const btn = document.getElementById('ocrBtn');
    const status = document.getElementById('statusOCR');
    if(!file) return alert('اختار صورة أولاً');
    btn.disabled = true; btn.textContent = '⏳ جاري الاستخراج...';
    status.style.display = 'none';
    document.getElementById('ocrResult').value = '';
    try {
        const worker = await Tesseract.createWorker({
            workerPath: 'https://unpkg.com/tesseract.js@5.0.4/dist/worker.min.js',
            corePath: 'https://unpkg.com/tesseract.js-core@5.0.0/tesseract-core.wasm.js'
        });
        await worker.loadLanguage(lang);
        await worker.initialize(lang);
        const { data: { text } = await worker.recognize(file);
        await worker.terminate();
        document.getElementById('ocrResult').value = text;
        status.className = 'status success';
        status.textContent = '✅ تم استخراج النص بنجاح';
        status.style.display = 'block';
    } catch(e) {
        status.className = 'status error';
        status.textContent = '❌ خطأ في الاتصال - جرب صورة أصغر';
        status.style.display = 'block';
    }
    btn.disabled = false; btn.textContent = '🔍 استخراج النص';
}

document.getElementById('quality').oninput = function() {
    document.getElementById('qVal').textContent = this.value;
}

async function compressImage() {
    const file = document.getElementById('compressInput').files[0];
    const quality = document.getElementById('quality').value / 100;
    const btn = document.getElementById('compressBtn');
    const status = document.getElementById('statusCompress');
    if(!file) return alert('اختار صورة أولاً');
    btn.disabled = true; btn.textContent = '⏳ جاري الضغط...';
    status.style.display = 'none';
    const img = new Image();
    img.src = URL.createObjectURL(file);
    await new Promise(r => img.onload = r);
    const canvas = document.createElement('canvas');
    canvas.width = img.width;
    canvas.height = img.height;
    canvas.getContext('2d').drawImage(img, 0, 0);
    canvas.toBlob(blob => {
        const url = URL.createObjectURL(blob);
        const link = document.getElementById('downloadCompress');
        link.href = url;
        link.style.display = 'block';
        const saved = ((1 - blob.size/file.size)*100).toFixed(0);
        status.className = 'status success';
        status.textContent = `✅ تم الضغط! وفرت ${saved}%`;
        status.style.display = 'block';
        btn.disabled = false; btn.textContent = '⚡ اضغط الصورة';
    }, 'image/jpeg', quality);
}

function readFile(file) {
    return new Promise(resolve => {
        const reader = new FileReader();
        reader.onload = e => resolve(e.target.result);
        reader.readAsDataURL(file);
    });
}
</script>
</body>
</html>
